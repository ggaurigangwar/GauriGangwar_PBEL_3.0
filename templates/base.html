<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}VitaCare{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Manrope:wght@500;600;700;800&display=swap"
          rel="stylesheet">

    <!-- Global Styles -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

    <!-- Layout -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/sidebar.css') }}">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/navbar.css') }}">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/dashboard.css') }}">

    <!-- Components -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/hero.css') }}">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/accuracy.css') }}">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/commitment.css') }}">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/faq.css') }}">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/footer.css') }}">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/commitment.css') }}">      

    {% block extra_css %}{% endblock %}

</head>

<body>

    {% include 'components/sidebar.html' %}

    <main class="main-content">

        {% include 'components/navbar.html' %}

        {% block content %}
        {% endblock %}

        {% include 'components/footer.html' %}

    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Page-specific JS -->
    {% block extra_js %}{% endblock %}

</body>

</html>
