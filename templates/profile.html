<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Profile | VitaCare AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="bg-circle bg1"></div>
<div class="bg-circle bg2"></div>
<div class="bg-circle bg3"></div>

<div class="container py-5">

    <div class="auth-card mx-auto" style="max-width:700px;">

        <h2 class="text-center">👤 Health Profile</h2>

        <p class="text-center text-muted mb-4">
            Complete your medical information to receive more personalized AI recommendations.
        </p>

        <form method="POST">

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label class="form-label">Date of Birth</label>
                    <input type="date" class="form-control" name="dob">
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Gender</label>
                    <select class="form-control" name="gender">
                        <option value="">Select</option>
                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Height (cm)</label>
                    <input type="number" class="form-control" name="height">
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Weight (kg)</label>
                    <input type="number" class="form-control" name="weight">
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Blood Group</label>
                    <select class="form-control" name="blood_group">
                        <option value="">Select</option>
                        <option>A+</option>
                        <option>A-</option>
                        <option>B+</option>
                        <option>B-</option>
                        <option>AB+</option>
                        <option>AB-</option>
                        <option>O+</option>
                        <option>O-</option>
                    </select>
                </div>

                <div class="col-12 mb-3">
                    <label class="form-label">Existing Diseases</label>
                    <textarea class="form-control" rows="3" name="existing_disease"></textarea>
                </div>

                <div class="col-12 mb-3">
                    <label class="form-label">Allergies</label>
                    <textarea class="form-control" rows="3" name="allergies"></textarea>
                </div>

                <div class="col-12 mb-4">
                    <label class="form-label">Current Medications</label>
                    <textarea class="form-control" rows="3" name="current_medications"></textarea>
                </div>

            </div>

            <button class="btn btn-primary w-100">
                Save Profile
            </button>

        </form>

    </div>

</div>

</body>
</html>
