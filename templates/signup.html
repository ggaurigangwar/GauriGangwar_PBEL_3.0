<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | VitaCare AI</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Your CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <!-- Background Circles -->
    <div class="bg-circle bg1"></div>
    <div class="bg-circle bg2"></div>
    <div class="bg-circle bg3"></div>

    <div class="auth-container">

        <div class="auth-card">

            <h2>🩺Welcome to VitaCare AI </h2>
            <p>Create Your Account To Begin Your AI-powered Healthcare Journey.</p>

            <!-- Flash Messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}

                        <div class="alert alert-{{ category }}">
                            {{ message }}
                        </div>

                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form action="{{ url_for('signup') }}" method="POST">

                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input
                    type="text"
                    class="form-control"
                    name="name"
                    placeholder="Enter your full name"
                    required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input
                        type="email"
                        class="form-control"
                        name="email"
                        placeholder="Enter your email address"
                        autocomplete="email"
                        required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input
                        type="password"
                        class="form-control"
                        name="password"
                        placeholder="Create a password"
                        autocomplete="new-password"
                        required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Confirm Password</label>
                    <input
                        type="password"
                        class="form-control"
                        name="confirm_password"
                        placeholder="Confirm your password"
                        autocomplete="new-password"
                        required>
                </div>

                <button type="submit" class="btn btn-primary">
                    Create Account
                </button>

            </form>

            <div class="auth-link">

                Already have an account?

                <a href="{{ url_for('login') }}">
                    Login
                </a>

            </div>

        </div>

    </div>

</body>
</html>
